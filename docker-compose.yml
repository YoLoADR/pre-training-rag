version: "3.9"

# HomeButler AI — Déploiement VPS
# Prérequis : .env avec ANTHROPIC_API_KEY ou OLLAMA_MODEL configuré
# Usage : docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
    restart: unless-stopped
    # Pour charger le modèle au démarrage :
    # command: ollama run homebutler  # après avoir créé le Modelfile

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_PATH=/app/data/chroma_db
      - FAISS_PATH=/app/data/faiss_index
    depends_on:
      - ollama
      - chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
